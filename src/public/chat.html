<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat API - Test Client</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; height:100vh; display:flex; flex-direction:column; }
  .header { background:#1e293b; padding:12px 20px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:12px; }
  .header h1 { font-size:1.1rem; color:#3b82f6; }
  .status { font-size:0.75rem; padding:3px 8px; border-radius:4px; }
  .status.online { background:#166534; color:#4ade80; }
  .status.offline { background:#7f1d1d; color:#f87171; }
  .main { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:280px; background:#1e293b; border-right:1px solid #334155; display:flex; flex-direction:column; }
  .sidebar h3 { padding:12px 16px; font-size:0.8rem; color:#64748b; text-transform:uppercase; letter-spacing:1px; }
  .room-list { flex:1; overflow-y:auto; }
  .room-item { padding:10px 16px; cursor:pointer; border-bottom:1px solid #334155; transition:background 0.15s; }
  .room-item:hover, .room-item.active { background:#334155; }
  .room-item .name { font-size:0.9rem; font-weight:600; }
  .room-item .preview { font-size:0.75rem; color:#64748b; margin-top:2px; }
  .chat-area { flex:1; display:flex; flex-direction:column; }
  .messages { flex:1; overflow-y:auto; padding:16px; }
  .msg { margin-bottom:12px; max-width:70%; }
  .msg.mine { margin-left:auto; }
  .msg .bubble { padding:8px 14px; border-radius:12px; font-size:0.9rem; line-height:1.4; }
  .msg.mine .bubble { background:#3b82f6; border-bottom-right-radius:4px; }
  .msg.other .bubble { background:#334155; border-bottom-left-radius:4px; }
  .msg .meta { font-size:0.7rem; color:#64748b; margin-top:3px; padding:0 4px; }
  .msg.mine .meta { text-align:right; }
  .msg.system { max-width:100%; text-align:center; }
  .msg.system .bubble { background:transparent; color:#64748b; font-size:0.8rem; font-style:italic; }
  .typing-indicator { padding:4px 16px; font-size:0.75rem; color:#64748b; height:20px; }
  .input-area { padding:12px 16px; background:#1e293b; border-top:1px solid #334155; display:flex; gap:8px; }
  .input-area input { flex:1; padding:10px 14px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0; font-size:0.9rem; outline:none; }
  .input-area input:focus { border-color:#3b82f6; }
  .input-area button { padding:10px 20px; background:#3b82f6; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
  .input-area button:hover { background:#2563eb; }
  .auth-panel { padding:20px; }
  .auth-panel input { width:100%; padding:8px 12px; margin-bottom:8px; background:#0f172a; border:1px solid #334155; border-radius:6px; color:#e2e8f0; }
  .auth-panel button { width:100%; padding:8px; background:#3b82f6; color:#fff; border:none; border-radius:6px; cursor:pointer; margin-bottom:6px; }
  .auth-panel button.secondary { background:#334155; }
  .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4ade80; margin-right:6px; }
</style>
</head>
<body>

<div class="header">
  <h1>💬 Real-Time Chat</h1>
  <span class="status offline" id="connStatus">Disconnected</span>
  <span style="flex:1"></span>
  <span style="font-size:0.8rem; color:#64748b;" id="userName"></span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="auth-panel" id="authPanel">
      <h3 style="padding:0 0 12px;">Login / Register</h3>
      <input type="text" id="authName" placeholder="Name" />
      <input type="email" id="authEmail" placeholder="Email" />
      <input type="password" id="authPassword" placeholder="Password" />
      <button onclick="register()">Register</button>
      <button class="secondary" onclick="login()">Login</button>
      <p id="authError" style="color:#f87171; font-size:0.75rem; margin-top:6px;"></p>
    </div>

    <div id="roomsPanel" style="display:none;">
      <h3>Rooms</h3>
      <div style="padding:8px 12px;">
        <input type="text" id="newRoomName" placeholder="New room name..." style="width:100%;padding:6px 10px;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-size:0.8rem;" />
        <button onclick="createRoom()" style="width:100%;padding:6px;margin-top:4px;background:#334155;color:#e2e8f0;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem;">+ Create Room</button>
      </div>
      <div class="room-list" id="roomList"></div>

      <h3>Online Users</h3>
      <div id="onlineList" style="padding:8px 16px; font-size:0.8rem;"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div style="text-align:center; color:#64748b; margin-top:40%; font-size:0.9rem;">
        Login and join a room to start chatting
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')sendMessage()" oninput="handleTyping()" />
      <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let token = null;
  let socket = null;
  let currentRoom = null;
  let myUserId = null;
  let typingTimeout = null;

  async function register() {
    const name = document.getElementById('authName').value;
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (data.success) { token = data.data.token; myUserId = data.data.user._id; onAuth(data.data.user); }
      else document.getElementById('authError').textContent = data.error;
    } catch (e) { document.getElementById('authError').textContent = e.message; }
  }

  async function login() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) { token = data.data.token; myUserId = data.data.user._id; onAuth(data.data.user); }
      else document.getElementById('authError').textContent = data.error;
    } catch (e) { document.getElementById('authError').textContent = e.message; }
  }

  function onAuth(user) {
    document.getElementById('authPanel').style.display = 'none';
    document.getElementById('roomsPanel').style.display = 'block';
    document.getElementById('userName').textContent = `👤 ${user.name}`;
    connectSocket();
    loadRooms();
  }

  function connectSocket() {
    socket = io(API, { auth: { token } });

    socket.on('connect', () => {
      document.getElementById('connStatus').className = 'status online';
      document.getElementById('connStatus').textContent = 'Connected';
      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
    });

    socket.on('disconnect', () => {
      document.getElementById('connStatus').className = 'status offline';
      document.getElementById('connStatus').textContent = 'Disconnected';
    });

    socket.on('message:new', (msg) => {
      if (currentRoom && msg.roomId === currentRoom) appendMessage(msg);
    });

    socket.on('dm:new', (msg) => appendMessage(msg));

    socket.on('typing:update', (data) => {
      if (data.roomId === currentRoom && data.isTyping) {
        document.getElementById('typingIndicator').textContent = `${data.userName} is typing...`;
        setTimeout(() => { document.getElementById('typingIndicator').textContent = ''; }, 3000);
      } else {
        document.getElementById('typingIndicator').textContent = '';
      }
    });

    socket.on('presence:update', (data) => updateOnlineList());
    socket.on('room:update', (data) => {
      addSystemMessage(`${data.user.name} ${data.event === 'user_joined' ? 'joined' : 'left'} the room`);
    });

    socket.on('room:history', (data) => {
      document.getElementById('messages').innerHTML = '';
      data.messages.forEach(msg => appendMessage(msg));
    });

    socket.on('error', (data) => {
      addSystemMessage(`Error: ${data.message}`);
    });

    updateOnlineList();
  }

  async function loadRooms() {
    const res = await fetch(`${API}/api/rooms`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    const list = document.getElementById('roomList');
    list.innerHTML = '';
    (data.data || []).forEach(room => {
      const div = document.createElement('div');
      div.className = 'room-item' + (currentRoom === room._id ? ' active' : '');
      div.innerHTML = `<div class="name">${room.type === 'dm' ? '💬' : '#'} ${room.name}</div><div class="preview">${room.members?.length || 0} members</div>`;
      div.onclick = () => joinRoom(room._id, room.name);
      list.appendChild(div);
    });
  }

  async function createRoom() {
    const name = document.getElementById('newRoomName').value.trim();
    if (!name) return;
    await fetch(`${API}/api/rooms`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, type: 'public' })
    });
    document.getElementById('newRoomName').value = '';
    loadRooms();
  }

  function joinRoom(roomId, roomName) {
    currentRoom = roomId;
    document.getElementById('messages').innerHTML = '';
    addSystemMessage(`Joined #${roomName}`);
    socket.emit('room:join', { roomId });
    loadRooms();
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content || !currentRoom) return;
    socket.emit('message:send', { roomId: currentRoom, content });
    socket.emit('typing:stop', { roomId: currentRoom });
    input.value = '';
  }

  function handleTyping() {
    if (!currentRoom) return;
    socket.emit('typing:start', { roomId: currentRoom });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => socket.emit('typing:stop', { roomId: currentRoom }), 2000);
  }

  function appendMessage(msg) {
    const div = document.createElement('div');
    const isMine = msg.sender?._id === myUserId || msg.sender?.id === myUserId;
    div.className = `msg ${isMine ? 'mine' : 'other'}`;
    const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML = `<div class="bubble">${escapeHtml(msg.content)}</div><div class="meta">${isMine ? '' : (msg.sender?.name || 'Unknown') + ' • '}${time}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
  }

  function addSystemMessage(text) {
    const div = document.createElement('div');
    div.className = 'msg system';
    div.innerHTML = `<div class="bubble">${text}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 999999;
  }

  async function updateOnlineList() {
    if (!token) return;
    try {
      const res = await fetch(`${API}/api/users/online`, { headers: { Authorization: `Bearer ${token}` } });
      const data = await res.json();
      const list = document.getElementById('onlineList');
      list.innerHTML = (data.data || []).map(u => `<div style="padding:3px 0;"><span class="online-dot"></span>${u.name}</div>`).join('') || '<div style="color:#64748b;">No users online</div>';
    } catch {}
  }

  setInterval(updateOnlineList, 10000);

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
